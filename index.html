
<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JH Job Solution</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

/* PART 1 - HEADER */
header{
    background:#007bff;
    color:white;
    padding:15px;
    text-align:center;
}

/* PART 1B - HERO SECTION */
.hero{
    padding:40px;
    text-align:center;
    background:white;
}

.hero h1{
    color:#333;
}

/* PART 2 - SERVICES */
.services{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}

.service-box{
    background:white;
    margin:10px;
    padding:20px;
    width:250px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center;
}

/* PART 3 - FORM */
.form-section{
    background:#fff;
    padding:30px;
    text-align:center;
}

input, textarea{
    width:90%;
    padding:10px;
    margin:10px 0;
}

/* FOOTER */
footer{
    background:#222;
    color:white;
    text-align:center;
    padding:10px;
}
</style>
</head>

<body>

<!-- PART 1 -->
<header>
    <h2>Jharkhand Job Solution</h2>
</header>

<!-- PART 1B -->
<section class="hero">
    <h1>Find Your Dream Job Easily</h1>
    <p>We help you get the best local jobs in your area</p>
</section>

<!-- PART 2 -->
<section class="services">
    <div class="service-box">
        <h3>Job Placement</h3>
        <p>We connect you with companies</p>
    </div>

    <div class="service-box">
        <h3>Resume Help</h3>
        <p>Professional CV creation</p>
    </div>

    <div class="service-box">
        <h3>Interview Support</h3>
        <p>Prepare for interviews easily</p>
    </div>
</section>

<!-- PART 3 -->
<section class="form-section">
    <h2>Apply for Job</h2>

    <form>
        <input type="text" placeholder="Your Name" required>
        <input type="tel" placeholder="Mobile Number" required>
        <textarea rows="4" placeholder="Your Skills"></textarea>
        <button type="submit">Submit</button>
    </form>
</section>

<!-- FOOTER -->
<footer>
    <p>© 2026 Jharkhand Job Solution</p>
</footer>

</body>
</html>
