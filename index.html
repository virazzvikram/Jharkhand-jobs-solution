<form action="https://formsubmit.co/Dasvikram1014@gmail.com" method="POST" style="max-width:500px;margin:auto;text-align:left;">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_subject" value="New Job Application - Jharkhand Job Solution">

<label>Full Name</label>
<input type="text" name="Full Name" required style="width:100%;padding:10px;margin:8px 0;">

<label>Father's Name</label>
<input type="text" name="Father's Name" required style="width:100%;padding:10px;margin:8px 0;">

<label>Mobile Number</label>
<input type="tel" name="Mobile Number" required style="width:100%;padding:10px;margin:8px 0;">

<label>Age</label>
<input type="number" name="Age" required style="width:100%;padding:10px;margin:8px 0;">

<label>Gender</label>
<select name="Gender" style="width:100%;padding:10px;margin:8px 0;">
<option>Male</option>
<option>Female</option>
<option>Other</option>
</select>

<label>Qualification</label>
<input type="text" name="Qualification" required style="width:100%;padding:10px;margin:8px 0;">

<label>District</label>
<input type="text" name="District" required style="width:100%;padding:10px;margin:8px 0;">

<label>Current Address</label>
<textarea name="Current Address" required style="width:100%;padding:10px;margin:8px 0;"></textarea>

<label>Work Experience</label>
<input type="text" name="Experience" placeholder="Fresher / 1 Year / 2 Years" style="width:100%;padding:10px;margin:8px 0;">

<label>Preferred Job Location</label>
<input type="text" name="Preferred Job Location" style="width:100%;padding:10px;margin:8px 0;">

<label>Job Category</label>
<select name="Job Category" style="width:100%;padding:10px;margin:8px 0;">
<option>Office Job</option>
<option>Receptionist</option>
<option>Accountant</option>
<option>Sales</option>
<option>Delivery</option>
<option>Security Guard</option>
<option>Driver</option>
<option>Hotel Staff</option>
<option>Other</option>
</select>

<button type="submit" style="background:#198754;color:white;padding:12px 25px;border:none;border-radius:8px;font-size:16px;">
Apply Now
</button>

</form>
