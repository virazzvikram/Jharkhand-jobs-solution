<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jharkhand Job Solution</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

/* HEADER */
header{
    background:#007bff;
    color:white;
    padding:15px;
    text-align:center;
    position:sticky;
    top:0;
}

/* HERO */
.hero{
    padding:40px;
    text-align:center;
    background:white;
}

.hero h1{
    color:#333;
}

/* SERVICES */
.services{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}

.service-box{
    background:white;
    margin:10px;
    padding:20px;
    width:250px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
    text-align:center;
    border-radius:10px;
}

/* FORM */
.form-section{
    background:#fff;
    padding:30px;
    text-align:center;
}

input, textarea{
    width:90%;
    padding:10px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:5px;
}

button{
    padding:10px 20px;
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

button:hover{
    background:#0056b3;
}

/* WHATSAPP BUTTON */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:12px 15px;
    border-radius:50px;
    text-decoration:none;
    font-weight:bold;
}

/* FOOTER */
footer{
    background:#222;
    color:white;
    text-align:center;
    padding:10px;
    margin-top:20px;
}
</style>
</head>

<body>

<!-- STEP 2 + STEP 3: WhatsApp Number (ONE TIME SET) -->
<script>
const WHATSAPP_NUMBER = "919204926920";
</script>

<header>
    <h2>Jharkhand Job Solution</h2>
</header>

<section class="hero">
    <h1>Find Your Dream Job Easily</h1>
    <p>We help you get local jobs fast</p>
</section>

<section class="services">
    <div class="service-box">
        <h3>Job Placement</h3>
        <p>We connect you with companies</p>
    </div>

    <div class="service-box">
        <h3>Resume Help</h3>
        <p>Professional CV creation</p>
    </div>

    <div class="service-box">
        <h3>Interview Support</h3>
        <p>Prepare for interviews easily</p>
    </div>
</section>

<!-- STEP 3: FORM (IMPROVED) -->
<section class="form-section">
    <h2>Apply for Job</h2>

    <form onsubmit="sendForm(event)">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="tel" id="phone" placeholder="Mobile Number" required>
        <textarea id="skills" rows="4" placeholder="Your Skills"></textarea>
        <button type="submit">Submit</button>
    </form>
</section>

<!-- STEP 2: WhatsApp Floating Button -->
<a class="whatsapp" id="waBtn" target="_blank">
💬 WhatsApp Apply
</a>

<footer>
    <p>© 2026 Jharkhand Job Solution</p>
</footer>

<script>
// WhatsApp link auto generate
document.getElementById("waBtn").href =
"https://wa.me/" + WHATSAPP_NUMBER;

// Form submit handler
function sendForm(e){
    e.preventDefault();

    let name = document.getElementById("name").value;
    let phone = document.getElementById("phone").value;

    if(name=="" || phone==""){
        alert("Please fill all required fields");
        return;
    }

    alert("Form submitted successfully! We will contact you soon.");
}
</script>

</body>
</html>
