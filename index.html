<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jharkhand Job Solution</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#f4f4f4;
}

/* HEADER */
header{
    background:#007bff;
    color:white;
    padding:15px;
    text-align:center;
    position:sticky;
    top:0;
}

/* HERO */
.hero{
    padding:30px;
    text-align:center;
    background:white;
}

/* SERVICES */
.services{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}

.service-box{
    background:white;
    margin:10px;
    padding:20px;
    width:250px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

/* FORM */
.form-section{
    background:white;
    padding:20px;
    text-align:center;
}

input, textarea{
    width:90%;
    padding:10px;
    margin:8px;
    border:1px solid #ccc;
}

/* BUTTON */
button{
    padding:10px 15px;
    background:#007bff;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

/* WHATSAPP BUTTON */
.whatsapp{
    position:fixed;
    bottom:20px;
    right:20px;
    background:#25D366;
    color:white;
    padding:12px;
    border-radius:50px;
    text-decoration:none;
    font-weight:bold;
}

/* ADMIN PANEL */
.admin-bar{
    background:#222;
    color:white;
    padding:10px;
    text-align:center;
}

.job-list{
    display:flex;
    flex-wrap:wrap;
    justify-content:center;
    padding:20px;
}

.job{
    background:white;
    margin:10px;
    padding:15px;
    width:250px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
</style>
</head>

<body>

<!-- ADMIN BAR -->
<div class="admin-bar">
    Admin Password:
    <input type="password" id="pass">
    <button onclick="loginAdmin()">Login</button>
    <button onclick="logoutAdmin()">Logout</button>
</div>

<header>
    <h2>Jharkhand Job Solution</h2>
</header>

<section class="hero">
    <h1>Find Your Dream Job Easily</h1>
    <p>Local jobs, fast apply system</p>
</section>

<!-- SERVICES -->
<section class="services">
    <div class="service-box">
        <h3>Job Placement</h3>
        <p>We connect you with companies</p>
    </div>

    <div class="service-box">
        <h3>Resume Help</h3>
        <p>Professional CV support</p>
    </div>

    <div class="service-box">
        <h3>Interview Guide</h3>
        <p>Prepare easily</p>
    </div>
</section>

<!-- APPLY FORM -->
<section class="form-section">
    <h2>Apply for Job</h2>

    <form onsubmit="submitForm(event)">
        <input type="text" id="name" placeholder="Your Name" required>
        <input type="tel" id="phone" placeholder="Mobile Number" required>
        <textarea id="skills" placeholder="Your Skills"></textarea>
        <button type="submit">Submit</button>
    </form>
</section>

<!-- ADD JOB (ADMIN ONLY) -->
<section class="form-section" id="adminForm" style="display:none;">
    <h3>Add New Job</h3>
    <input type="text" id="jobTitle" placeholder="Job Title">
    <textarea id="jobDesc" placeholder="Job Description"></textarea>
    <button onclick="addJob()">Add Job</button>
</section>

<!-- JOB LIST -->
<section class="job-list" id="jobList"></section>

<!-- WHATSAPP BUTTON -->
<a class="whatsapp" href="https://wa.me/919204926920" target="_blank">
💬 WhatsApp Apply
</a>

<footer style="text-align:center;padding:10px;background:#222;color:white;">
    © 2026 Jharkhand Job Solution
</footer>

<script>

let isAdmin = false;
let jobs = JSON.parse(localStorage.getItem("jobs")) || [];

// SHOW JOBS
function renderJobs(){
    let html = "";
    jobs.forEach((job, index)=>{
        html += `
        <div class="job">
            <h3>${job.title}</h3>
            <p>${job.desc}</p>
            ${isAdmin ? `<button onclick="deleteJob(${index})">Delete</button>` : ""}
        </div>`;
    });
    document.getElementById("jobList").innerHTML = html;
}
renderJobs();

// <h3>Add New Job</h3>
<input type="text" id="jobTitle">
<textarea id="jobDesc"></textarea>
<button onclick="addJob()">Add Job</button>
    let title = document.getElementById("jobTitle").value;
    let desc = document.getElementById("jobDesc").value;

    if(title==""){
        alert("Job title required");
        return;
    }

    jobs.push({title, desc});
    localStorage.setItem("jobs", JSON.stringify(jobs));

    document.getElementById("jobTitle").value="";
    document.getElementById("jobDesc").value="";

    renderJobs();
}

// async function deleteJob(id){

    await deleteDoc(doc(db,"jobs",id));

    renderJobs();

}
}

// 
}async function submitForm(e){

    e.preventDefault();

    let name=document.getElementById("name").value;
    let phone=document.getElementById("phone").value;
    let skills=document.getElementById("skills").value;

    await addDoc(collection(db,"applications"),{
        name:name,
        phone:phone,
        skills:skills,
        createdAt:new Date()
    });

    alert("Application Submitted Successfully!");

    e.target.reset();

}

// ADMIN LOGIN
function loginAdmin(){
    let pass = document.getElementById("pass").value;

    if(pass=="admin123"){
        isAdmin = true;
        document.getElementById("adminForm").style.display="block";
        alert("Admin Login Success");
        renderJobs();
    }else{
        alert("Wrong Password");
    }
}

// LOGOUT
function logoutAdmin(){
    isAdmin = false;
    document.getElementById("adminForm").style.display="none";
    alert("Logged Out");
    renderJobs();
}

</script>

</body>
</html>
